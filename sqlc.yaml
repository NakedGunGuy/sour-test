version: "2"
plugins:
  - name: php
    process:
      cmd: sqlc-gen-from-template
    env:
      - TEMPLATE_PATH=database/templates/php-queries.tmpl
sql:
  - schema: "database/schema.sql"
    queries: "database/queries/"
    engine: "sqlite"
    codegen:
      - plugin: php
        out: "app/Database/Generated"
